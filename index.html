<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingredigo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@400;600&family=Jost:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal:        #0A4147;
  --teal-80:     rgba(10,65,71,.80);
  --teal-40:     rgba(10,65,71,.40);
  --teal-15:     rgba(10,65,71,.15);
  --teal-08:     rgba(10,65,71,.08);
  --teal-light:  #0d5560;
  --gold:        #A89150;
  --gold-light:  #c4aa72;
  --gold-pale:   #e8dfc0;
  --bg:          #F2E8D3;
  --bg-2:        #ede0c4;
  --bg-3:        #e4d5b0;
  --white:       #faf7f0;
  --line:        rgba(168,145,80,.3);
  --line-2:      rgba(168,145,80,.5);
  --red:         #7a2828;
  --red-lt:      #f8f0f0;
  --r: 2px; --r-lg: 4px;
  --sh:    0 1px 6px rgba(10,65,71,.10), 0 1px 2px rgba(10,65,71,.06);
  --sh-lg: 0 6px 24px rgba(10,65,71,.14), 0 2px 8px rgba(10,65,71,.08);
}

body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--teal);
  font-size: 15px;
  line-height: 1.6;
  font-weight: 300;
  min-height: 100vh;
}

/* HEADER */
header {
  background: var(--teal);
  color: var(--bg);
  height: 68px;
  display: flex; align-items: center; justify-content: center;
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid rgba(168,145,80,.4);
}
header::before, header::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 1px;
  background: linear-gradient(to bottom, transparent, var(--gold-light), transparent);
  opacity: .4;
}
header::before { left: 2.5rem; }
header::after  { right: 2.5rem; }
.logo {
  font-family: 'Cormorant SC', serif;
  font-size: 22px; font-weight: 600;
  letter-spacing: .35em; text-transform: uppercase;
  color: var(--bg);
}
.logo-ornament {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 11px;
  color: var(--gold-light); letter-spacing: .2em;
  text-align: center; display: block; margin-top: 2px;
}

/* TABS */
.tabs {
  background: var(--bg);
  border-bottom: 1px solid var(--line-2);
  display: flex; padding: 0 1.5rem;
  position: sticky; top: 68px; z-index: 40;
}
.tab {
  padding: 0 1.25rem; height: 46px;
  font-family: 'Jost', sans-serif;
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 500;
  border: none; background: none; color: var(--teal-40);
  cursor: pointer; border-bottom: 1.5px solid transparent;
  margin-bottom: -1px; transition: color .2s;
  display: flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--teal); }
.tab.active { color: var(--teal); border-bottom-color: var(--gold); }
.badge {
  font-size: 10px; background: var(--teal); color: var(--bg);
  border-radius: 10px; padding: 1px 7px; font-weight: 400; letter-spacing: .04em;
}

/* MAIN */
main { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 7rem; }
.page { display: none; }
.page.active { display: block; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; flex-wrap: wrap; }
.toolbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-style: italic; font-weight: 300;
  color: var(--teal); flex: 1; letter-spacing: .02em;
}

/* GOLD RULE */
.gold-rule {
  display: flex; align-items: center; gap: 12px;
  margin: .5rem 0 1.5rem; color: var(--gold);
}
.gold-rule::before, .gold-rule::after {
  content: ''; flex: 1; height: 1px; background: var(--line-2);
}
.gold-rule span { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; font-weight: 500; white-space: nowrap; }

/* INPUTS */
input[type=text],input[type=search],input[type=password],select,textarea {
  font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300;
  background: var(--white); color: var(--teal);
  border: 1px solid var(--line-2); border-radius: var(--r);
  padding: 8px 12px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
input:focus,select:focus,textarea:focus {
  border-color: var(--teal-40);
  box-shadow: 0 0 0 3px var(--teal-08);
}
.search-box { width: 220px; }

/* BUTTONS */
.btn {
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 8px 20px; border-radius: var(--r);
  border: 1px solid var(--line-2);
  background: transparent; color: var(--teal);
  cursor: pointer; transition: all .2s;
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
}
.btn:hover { background: var(--teal-08); border-color: var(--teal-40); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--teal); color: var(--bg); border-color: var(--teal); }
.btn-primary:hover { background: var(--teal-light); border-color: var(--teal-light); }
.btn-green { background: var(--teal); color: var(--bg); border-color: var(--teal); }
.btn-green:hover { background: var(--teal-light); }
.btn-sm { padding: 5px 14px; font-size: 11px; }
.btn-ghost { background: none; border-color: transparent; color: var(--teal-40); letter-spacing: .08em; }
.btn-ghost:hover { background: var(--teal-08); color: var(--teal); border-color: transparent; }
.btn-danger { color: var(--red); border-color: transparent; background: none; text-transform: uppercase; font-size: 11px; letter-spacing: .08em; }
.btn-danger:hover { background: var(--red-lt); border-color: var(--red); }

/* CARD */
.card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--sh);
}

/* RECIPE GRID */
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 16px; }
.rc {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.25rem;
  cursor: pointer;
  transition: box-shadow .2s, transform .2s, border-color .2s;
  position: relative;
}
.rc::after {
  content: '';
  position: absolute; bottom: 0; left: 1.25rem; right: 1.25rem;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0; transition: opacity .2s;
  border-radius: 0 0 var(--r-lg) var(--r-lg);
}
.rc:hover { box-shadow: var(--sh-lg); transform: translateY(-2px); border-color: var(--teal-15); }
.rc:hover::after { opacity: 1; }
.rc.in-week { border-color: var(--teal-40); background: rgba(10,65,71,.04); }
.rc.in-week::after { opacity: .6; }
.rc-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-weight: 600;
  margin-bottom: 6px; line-height: 1.3; color: var(--teal);
}
.rc-meta { font-size: 11px; color: var(--gold); display: flex; gap: 6px; flex-wrap: wrap; letter-spacing: .06em; text-transform: uppercase; font-weight: 400; }
.rc-meta span { background: var(--bg); padding: 1px 8px; border-radius: 2px; border: 1px solid var(--line); }
.rc.in-week .rc-meta span { background: rgba(10,65,71,.06); border-color: var(--teal-15); }
.rc-footer { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; }
.ic { font-size: 11px; color: var(--teal-40); letter-spacing: .04em; }
.wk-btn {
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 4px 12px; border-radius: var(--r);
  border: 1px solid var(--line-2); background: transparent;
  color: var(--teal-40); cursor: pointer; transition: all .2s;
}
.wk-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-08); }
.rc.in-week .wk-btn { background: var(--teal); color: var(--bg); border-color: var(--teal); }

/* FILTER CHIPS */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.chip {
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 4px 14px; border-radius: 2px;
  border: 1px solid var(--line-2); background: transparent;
  color: var(--teal-40); cursor: pointer; transition: all .2s;
}
.chip.active { background: var(--teal); color: var(--bg); border-color: var(--teal); }
.chip:hover:not(.active) { border-color: var(--teal-40); color: var(--teal); }

/* INGREDIENT TABLE */
.ing-table { width: 100%; border-collapse: collapse; }
.ing-table th {
  text-align: left; font-size: 10px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--gold);
  padding: 10px 16px; border-bottom: 1px solid var(--line-2); font-weight: 500;
  font-family: 'Jost', sans-serif;
}
.ing-table td { padding: 10px 16px; font-size: 14px; border-bottom: 1px solid var(--line); font-weight: 300; }
.ing-table tr:last-child td { border-bottom: none; }
.ing-table tr:hover td { background: var(--teal-08); }
.cat-b {
  font-size: 10px; padding: 2px 10px; border-radius: 2px;
  background: var(--bg); color: var(--gold);
  border: 1px solid var(--line); letter-spacing: .08em; text-transform: uppercase;
}

/* SHOPPING LIST */
.shop-sec { margin-bottom: 2rem; }
.shop-sec-title {
  font-family: 'Cormorant SC', serif;
  font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gold); padding: 0 0 8px;
  border-bottom: 1px solid var(--line-2); margin-bottom: 6px;
}
.sl-header { display: grid; grid-template-columns: 28px 1fr 95px 95px 130px; gap: 0 10px; padding: 4px 12px 6px; }
.sl-header span { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.si { display: grid; grid-template-columns: 28px 1fr 95px 95px 130px; gap: 0 10px; align-items: center; padding: 8px 12px; border-radius: var(--r); cursor: pointer; transition: background .15s; }
.si:hover { background: var(--teal-08); }
.si.ck { opacity: .38; }
.si.ck .si-name { text-decoration: line-through; }
.si-chk {
  width: 16px; height: 16px; border-radius: 2px;
  border: 1px solid var(--line-2); background: transparent;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.si-chk.tk { background: var(--teal); border-color: var(--teal); }
.si-name { font-size: 14px; font-weight: 300; }
.si-metric { font-size: 13px; font-weight: 500; color: var(--teal); font-variant-numeric: tabular-nums; }
.si-cups { font-size: 13px; color: var(--teal-40); font-variant-numeric: tabular-nums; }
.si-src { font-size: 11px; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .04em; font-style: italic; font-family: 'Cormorant Garamond', serif; }

/* MODAL */
.mb { display: none; position: fixed; inset: 0; background: rgba(10,65,71,.5); backdrop-filter: blur(3px); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.mb.open { display: flex; }
.modal { background: var(--bg); border-radius: var(--r-lg); box-shadow: var(--sh-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; overflow-x: visible; border: 1px solid var(--line-2); }
.mh { padding: 1.5rem 1.5rem 1.25rem; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid var(--line); }
.mh h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; font-weight: 300; color: var(--teal); }
.mbody { padding: 1.25rem 1.5rem; }
.mfoot { padding: 1.25rem 1.5rem; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--line); }
.xbtn { background: none; border: none; cursor: pointer; color: var(--teal-40); font-size: 20px; line-height: 1; padding: 2px; transition: color .2s; }
.xbtn:hover { color: var(--teal); }

/* FORM */
.fr { margin-bottom: 1.1rem; }
.fr label {
  display: block; font-size: 10px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 6px; font-weight: 500;
}
.fr input,.fr select,.fr textarea { width: 100%; }
.fr textarea { min-height: 70px; resize: vertical; }
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.fhint { font-size: 12px; color: var(--teal-40); margin-top: 4px; font-style: italic; font-family: 'Cormorant Garamond', serif; }

/* ING EDITOR */
.ie { border: 1px solid var(--line); border-radius: var(--r); overflow: visible; margin-bottom: 10px; background: var(--white); }
.ie-wrap { border-bottom: 1px solid var(--line); }
.ie-wrap:last-child { border-bottom: none; }
.row-hint { font-size: 11px; color: var(--teal-40); padding: 2px 12px 4px; font-style: italic; min-height: 4px; font-family: 'Cormorant Garamond', serif; }
.ie-row { display: flex; align-items: center; }
.ie-row input,.ie-row select { border: none; border-right: 1px solid var(--line); padding: 8px 12px; font-size: 14px; background: transparent; color: var(--teal); border-radius: 0; font-weight: 300; }
.ie-row input:focus,.ie-row select:focus { background: rgba(10,65,71,.04); outline: none; }
.c-qty { width: 80px; flex-shrink: 0; }
.c-unit { width: 90px; flex-shrink: 0; }
.c-name { flex: 1; }
.c-note { width: 130px; flex-shrink: 0; }
.c-del { width: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-right: none !important; }
.c-del button { background: none; border: none; cursor: pointer; color: var(--teal-40); font-size: 16px; padding: 4px; transition: color .2s; }
.c-del button:hover { color: var(--red); }
.ie-head { background: var(--bg); }
.ie-head span { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); padding: 6px 12px; display: block; font-weight: 500; }

/* AUTOCOMPLETE */
.ac-wrap { position: relative; flex: 1; }
.ac-list { position: fixed; background: var(--white); border: 1px solid var(--line-2); border-radius: var(--r); z-index: 9999; max-height: 180px; overflow-y: auto; box-shadow: var(--sh-lg); min-width: 200px; }
.ac-item { padding: 8px 14px; font-size: 14px; cursor: pointer; color: var(--teal); border-bottom: 1px solid var(--line); font-weight: 300; letter-spacing: .01em; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover,.ac-item.ac-sel { background: var(--teal-08); color: var(--teal); }

/* LISTS GRID */
.lists-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 14px; margin-top: .5rem; }
.list-card {
  background: var(--white); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 1.25rem; cursor: pointer;
  transition: box-shadow .2s, transform .2s; box-shadow: var(--sh);
  position: relative; overflow: hidden;
}
.list-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0; transition: opacity .2s;
}
.list-card:hover { box-shadow: var(--sh-lg); transform: translateY(-2px); }
.list-card:hover::before { opacity: 1; }
.list-card-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--teal); margin-bottom: 4px; }
.list-card-meta { font-size: 11px; color: var(--gold); letter-spacing: .06em; text-transform: uppercase; font-weight: 400; }
.list-card-actions { margin-top: 12px; display: flex; gap: 6px; justify-content: flex-end; }
.list-empty { text-align: center; padding: 3rem 1rem; color: var(--teal-40); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; }

/* WEEK LAYOUT */
.wk-layout { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; align-items: start; }
@media(max-width:680px){ .wk-layout { grid-template-columns: 1fr; } }
.wk-ri { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: 1px solid var(--line); border-radius: var(--r); background: var(--white); font-size: 14px; margin-bottom: 6px; font-weight: 300; }
.wk-ri-meta { font-size: 11px; color: var(--gold); margin-top: 2px; letter-spacing: .06em; text-transform: uppercase; font-family: 'Cormorant Garamond', serif; font-style: italic; }

/* SLIDE-UP PANEL */
#grocery-fab { border-top: 1px solid rgba(168,145,80,.5); }
#fab-handle { background: var(--teal) !important; border-top: 1px solid rgba(168,145,80,.4) !important; }
#fab-panel { background: var(--bg) !important; border-top: 1px solid var(--line) !important; }

/* MISC */
hr { border: none; border-top: 1px solid var(--line); margin: 1.25rem 0; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--teal-40); font-size: 15px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; }
a { color: var(--teal); }
</style>
</head>
<body>

<header>
  <!-- Gold rule ornaments -->
  <svg style="position:absolute;left:3rem;top:50%;transform:translateY(-50%);pointer-events:none;" width="60" height="20" viewBox="0 0 60 20">
    <line x1="0" y1="10" x2="50" y2="10" stroke="#A89150" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="7" x2="35" y2="7" stroke="#A89150" stroke-width="0.5" opacity="0.3"/>
    <polygon points="54,10 60,8 60,12" fill="#A89150" opacity="0.5"/>
  </svg>
  <div style="text-align:center;position:relative;z-index:1;">
    <span class="logo">Ingredigo</span>
    <span class="logo-ornament">a compendium of recipes</span>
  </div>
  <svg style="position:absolute;right:3rem;top:50%;transform:translateY(-50%);pointer-events:none;" width="60" height="20" viewBox="0 0 60 20">
    <line x1="10" y1="10" x2="60" y2="10" stroke="#A89150" stroke-width="0.5" opacity="0.6"/>
    <line x1="25" y1="7" x2="60" y2="7" stroke="#A89150" stroke-width="0.5" opacity="0.3"/>
    <polygon points="6,10 0,8 0,12" fill="#A89150" opacity="0.5"/>
  </svg>
</header>

<nav class="tabs">
  <button class="tab active" id="tab-recipes" onclick="showPage('recipes')">Recipes</button>
  <button class="tab" id="tab-ingredients" onclick="showPage('ingredients')">Ingredients</button>
  <button class="tab" id="tab-week" onclick="showPage('week')">Lists <span class="badge" id="lists-badge" style="display:none">0</span></button>
</nav>

<!-- Slide-up active list panel — replaces floating button -->
<div id="grocery-fab" style="display:none;position:fixed;bottom:62px;left:0;right:0;z-index:90;">
  <!-- Pull handle / collapsed state -->
  <div id="fab-handle" onclick="toggleFabPanel()" style="
    display:flex;align-items:center;justify-content:space-between;
    background:var(--teal);color:var(--bg);
    border-top:1px solid rgba(168,145,80,.4);
    padding:10px 1.5rem;
    cursor:pointer;
    font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
    box-shadow:0 -4px 16px rgba(10,65,71,.15);
  ">
    <div style="display:flex;align-items:center;gap:10px;">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3h1.5l2.1 8.4a1 1 0 0 0 1 .6h6.3a1 1 0 0 0 1-.75L16 7H5"/>
        <circle cx="7.5" cy="15" r="1"/><circle cx="13.5" cy="15" r="1"/>
      </svg>
      <span id="fab-list-name">—</span>
      <span id="wk-badge" style="background:rgba(168,145,80,.25);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.06em;padding:2px 10px;border-radius:2px;border:1px solid rgba(168,145,80,.3);"></span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="event.stopPropagation();showPage('week')" style="background:rgba(168,145,80,.2);border:1px solid rgba(168,145,80,.4);border-radius:2px;color:var(--bg);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:3px 12px;cursor:pointer;">Open list →</button>
      <span id="fab-chevron" style="font-size:12px;opacity:0.7;transition:transform .2s;">▲</span>
    </div>
  </div>
  <!-- Expanded panel -->
  <div id="fab-panel" style="display:none;background:var(--bg);border-top:1px solid var(--line);max-height:260px;overflow-y:auto;padding:.75rem 1.5rem;">
    <div id="fab-panel-content"></div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" style="display:none;position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:var(--teal);color:var(--bg);padding:8px 24px;border-radius:2px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;z-index:500;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(10,65,71,.3);border:1px solid rgba(168,145,80,.3);"></div>

<main>

  <!-- RECIPES -->
  <div class="page active" id="page-recipes">
    <div class="toolbar">
      <span class="toolbar-title">Recipe Catalogue</span>
      <input type="search" class="search-box" id="rsearch" placeholder="Search…" oninput="renderRecipes()">

const SB_URL = 'https://knddhilmyiysmwktkwoe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZGRoaWxteWl5c213a3Rrd29lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjQ0MjAsImV4cCI6MjA5Mzg0MDQyMH0.Evkw53vKWY2QP1AYemqQWmEk9sbmhFjaMBg6ev0Tyyc';
const SB_HEADERS = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};

async function sbGet(table, params=''){
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?'+params, {headers:SB_HEADERS});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table, data){
  const r = await fetch(SB_URL+'/rest/v1/'+table, {method:'POST', headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=representation'}, body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, id){
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+encodeURIComponent(id), {method:'DELETE', headers:SB_HEADERS});
  if(!r.ok) throw new Error(await r.text());
}

let ings = [];

function setLoading(msg){
  let el = document.getElementById('loading-overlay');
  if(msg){
    if(!el){
      el = document.createElement('div');
      el.id = 'loading-overlay';
      el.style.cssText = 'position:fixed;inset:0;background:rgba(242,232,211,.92);backdrop-filter:blur(4px);z-index:999;display:flex;align-items:center;justify-content:center;font-size:13px;color:#0A4147;font-family:Jost,sans-serif;letter-spacing:.18em;text-transform:uppercase;font-weight:500;';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.display = 'flex';
  } else if(el){
    el.style.display = 'none';
  }
}

async function loadAll(){
  setLoading('Loading Ingredigo…');
  try {
    const [fetchedIngs, fetchedRecs, fetchedLists] = await Promise.all([
      sbGet('ingredients','order=name.asc'),
      sbGet('recipes','order=name.asc'),
      sbGet('grocery_lists','order=updated_at.desc')
    ]);
    ings = fetchedIngs;
    recipes = fetchedRecs.map(r=>({...r, ingredients: r.ingredients||[]}));
    groceryLists = fetchedLists.map(l=>({...l, recipe_ids:l.recipe_ids||[], checked_items:l.checked_items||[]}));
    if(ings.length === 0){
      const seedData = SEED.map((s,i)=>({id:'i'+i,name:s.n,unit:s.u,cat:s.c}));
      await sbUpsert('ingredients', seedData);
      ings = seedData;
    }
  } catch(e){
    document.body.innerHTML = '<div style="padding:2rem;font-family:Georgia,serif;color:#b91c1c;"><strong>Could not connect to database.</strong><br><br>'+e.message+'</div>';
    return;
  }
  setLoading(null);
  renderRecipes();
  renderIngs();
  updBadge();
}

function oM(n,d){
  if(n==='rnew'){ editRid=null; document.getElementById('rm-title').textContent='New Recipe'; document.getElementById('r-del-btn').style.display='none'; clearRForm(); }

// ═══════════════════════════════════════
// RECIPES — RENDER
// ═══════════════════════════════════════
function renderRecipes(){
  const q=(document.getElementById('rsearch').value||'').toLowerCase();
  const types=[...new Set(recipes.map(r=>r.type).filter(Boolean))].sort();
  document.getElementById('rfilters').innerHTML=
    ['', ...types].map(t=>`<button class="chip ${typeFilter===t?'active':''}" onclick="setTF('${t}')">${t||'All'}</button>`).join('');

  let list=recipes;
  if(q) list=list.filter(r=>r.name.toLowerCase().includes(q)||(r.cuisine||'').toLowerCase().includes(q)||(r.source||'').toLowerCase().includes(q));
  if(typeFilter) list=list.filter(r=>r.type===typeFilter);
  list=[...list].sort((a,b)=>a.name.localeCompare(b.name));

  const g=document.getElementById('rgrid');
  if(!list.length){ g.innerHTML='<div class="empty" style="grid-column:1/-1">No recipes yet — click <strong>New Recipe</strong> to add one.</div>'; return; }
  g.innerHTML=list.map(r=>{
    const iw=weekIds.includes(r.id);
    return `<div class="rc ${iw?'in-week':''}" onclick="oM('redit',getRec('${r.id}'))">
      <div class="rc-name">${esc(r.name)}</div>
      <div class="rc-meta">${[r.type,r.cuisine,r.source].filter(Boolean).map(x=>`<span>${esc(x)}</span>`).join('')}</div>
      <div class="rc-footer">
        <span class="ic">${r.ingredients.length} ingredient${r.ingredients.length!==1?'s':''}</span>
        <button class="wk-btn" onclick="event.stopPropagation();toggleWk('${r.id}')">${iw?'✓ Added':'+ Add to list'}</button>
      </div>
    </div>`;
  }).join('');
  updBadge();
}
function setTF(t){ typeFilter=t; renderRecipes(); }
function getRec(id){ return recipes.find(r=>r.id===id); }

// ═══════════════════════════════════════
// RECIPE FORM
// ═══════════════════════════════════════
function clearRForm(){
  ['rf-name','rf-src','rf-cuisine','rf-servings'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rf-type').value='';
  document.getElementById('irows').innerHTML='';
}
function populateRForm(r){
  document.getElementById('rf-name').value=r.name||'';
  document.getElementById('rf-src').value=r.source||'';
  document.getElementById('rf-type').value=r.type||'';
  document.getElementById('rf-cuisine').value=r.cuisine||'';
  document.getElementById('rf-servings').value=r.servings||'';
  document.getElementById('irows').innerHTML='';
  (r.ingredients||[]).forEach(i=>addRow(i));
}
function addRow(d){
  const wrap=document.createElement('div');
  wrap.className='ie-wrap';
  const div=document.createElement('div');
  div.className='ie-row';
  const unitVal = d?.unit||'';
  const unitOpts = ['','g','kg','oz','lb','ml','L','tsp','tbsp','cup','fl oz','pint'];
  const unitOptions = unitOpts.map(u => `<option value="${u}" ${unitVal===u?'selected':''}>${u||'— none —'}</option>`).join('');
  div.innerHTML=`
    <input class="c-qty" type="text" inputmode="decimal" placeholder="qty" value="${esc(d?.qty||'')}" data-f="qty">
    <select class="c-unit" data-f="unit">${unitOptions}</select>
    <div class="ac-wrap"><input class="c-name" type="text" placeholder="ingredient name" value="${esc(d?.name||'')}" data-f="name" autocomplete="off"><div class="ac-list" style="display:none"></div></div>
    <input class="c-note" type="text" placeholder="note" value="${esc(d?.note||'')}" data-f="note">
    <div class="c-del"><button onclick="this.closest('.ie-wrap').remove()" title="Remove">×</button></div>`;
  const hint=document.createElement('div');
  hint.className='row-hint';
  wrap.appendChild(div);
  wrap.appendChild(hint);
  document.getElementById('irows').appendChild(wrap);

  // Numeric-only qty
  const qtyEl=div.querySelector('[data-f="qty"]');
  qtyEl.addEventListener('input',()=>{
    qtyEl.value=qtyEl.value.replace(/[^0-9.\/]/g,'');
    updateHint();
  });

  // Unit hint
  const unitEl=div.querySelector('[data-f="unit"]');
  unitEl.addEventListener('change',updateHint);

  function updateHint(){
    const qty=qtyEl.value.trim(), unit=unitEl.value.trim();
    const b=toBase(qty,unit);
    if(b && b.t!=='cnt'){
      const fmt=fmtVal(b.v,b.t,unit);
      hint.textContent=fmt.secondary ? fmt.primary+' = '+fmt.secondary : '';
    } else { hint.textContent=''; }
  }

  // Autocomplete on ingredient name
  const nameEl=div.querySelector('[data-f="name"]');
  const acList=div.querySelector('.ac-list');
  let acIdx=-1;

  function pick(name, unit){
    nameEl.value=name;
    const unitEl=div.querySelector('[data-f="unit"]');
    if(unit){ unitEl.value=unit; updateHint(); }
    acList.style.display='none';
    div.querySelector('[data-f="note"]').focus();
  }

  function showAc(){
    const q=nameEl.value.trim().toLowerCase();
    if(!q){ acList.style.display='none'; return; }
    const matches=ings.filter(i=>i.name.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){ acList.style.display='none'; return; }
    acIdx=-1;
    acList.innerHTML='';
    matches.forEach(m=>{
      const item=document.createElement('div');
      item.className='ac-item';
      item.innerHTML=`${esc(m.name)}<span style="font-size:11px;color:var(--ink-4);margin-left:6px;">${esc(m.unit||'')}</span>`;
      item.addEventListener('mousedown', e=>e.preventDefault());
      item.addEventListener('click', ()=>pick(m.name, m.unit||''));
      acList.appendChild(item);
    });
    // Position relative to input using fixed coords
    const rect=nameEl.getBoundingClientRect();
    acList.style.top=(rect.bottom+2)+'px';
    acList.style.left=rect.left+'px';
    acList.style.width=rect.width+'px';
    acList.style.display='block';
  }

  nameEl.addEventListener('input',showAc);
  nameEl.addEventListener('keydown',e=>{
    const items=[...acList.querySelectorAll('.ac-item')];
    if(!items.length) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); acIdx=Math.min(acIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('ac-sel',i===acIdx)); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); acIdx=Math.max(acIdx-1,0); items.forEach((el,i)=>el.classList.toggle('ac-sel',i===acIdx)); }
    else if(e.key==='Enter'&&acIdx>=0){ e.preventDefault(); items[acIdx].click(); }
    else if(e.key==='Escape'){ acList.style.display='none'; }
  });
  nameEl.addEventListener('blur',()=>setTimeout(()=>acList.style.display='none',150));

  if(d) updateHint();
  if(!d) qtyEl.focus();
}

function collectRows(){
  return [...document.querySelectorAll('#irows .ie-wrap')].map(w=>{
    const r=w.querySelector('.ie-row');
    return {
      qty:r.querySelector('[data-f="qty"]').value.trim(),
      unit:r.querySelector('[data-f="unit"]').value.trim(),
      name:r.querySelector('[data-f="name"]').value.trim().toLowerCase(),
      note:r.querySelector('[data-f="note"]').value.trim(),
    };
  }).filter(r=>r.name);
}
async function saveRecipe(){
  const name=document.getElementById('rf-name').value.trim();
  if(!name){ alert('Recipe name is required.'); return; }
  if(recipes.find(r=>r.name.toLowerCase()===name.toLowerCase()&&r.id!==editRid)){ alert('A recipe with this name already exists.'); return; }
  const ingList=collectRows();
  // Auto-register unknown ingredients into Supabase
  const newIngs=[];
  ingList.forEach(i=>{
    const k=i.name.toLowerCase().trim();
    if(!ings.find(x=>x.name.toLowerCase()===k)){
      const ni={id:'i'+Date.now()+Math.random(),name:k,unit:i.unit||'',cat:'Other'};
      ings.push(ni); newIngs.push(ni);
    }
  });
  if(newIngs.length){ try{ await sbUpsert('ingredients',newIngs); }catch(e){ alert('Error saving ingredients: '+e.message); return; } }
  const rec={id:editRid||('r'+Date.now()),name,source:document.getElementById('rf-src').value.trim(),
    type:document.getElementById('rf-type').value,cuisine:document.getElementById('rf-cuisine').value.trim(),
    servings:document.getElementById('rf-servings').value.trim(),ingredients:ingList};
  setLoading('Saving recipe…');
  try{
    await sbUpsert('recipes',rec);
    if(editRid){ const i=recipes.findIndex(r=>r.id===editRid); recipes[i]=rec; }
    else recipes.push(rec);
  }catch(e){ setLoading(null); alert('Error saving recipe: '+e.message); return; }
  setLoading(null);
  cM('recipe'); renderRecipes(); renderIngs();
}
async function delRecipe(){
  if(!editRid||!confirm('Delete this recipe?')) return;
  setLoading('Deleting…');
  try{ await sbDelete('recipes',editRid); }catch(e){ setLoading(null); alert('Error: '+e.message); return; }
  recipes=recipes.filter(r=>r.id!==editRid);
  weekIds=weekIds.filter(id=>id!==editRid);
  svLocal('mep_week',weekIds);
  setLoading(null);
  cM('recipe'); renderRecipes();
}

// ═══════════════════════════════════════
// CUPS / COOKING UNIT CONVERSION
// ═══════════════════════════════════════
function mlToCooking(ml){
  if(ml===null||ml===undefined||ml<=0) return '';
  const cup=250,tbsp=15,tsp=5;
  const cupFracs=[[1,'1 cup'],[0.75,'¾ cup'],[0.667,'⅔ cup'],[0.5,'½ cup'],[0.333,'⅓ cup'],[0.25,'¼ cup'],[0.125,'⅛ cup']];
  for(const [f,label] of cupFracs){ if(Math.abs(ml-f*cup)<6) return label; }
  if(ml>=cup){
    const cups=ml/cup, whole=Math.floor(cups), rem=cups-whole;
    const fracs=[[0.75,'¾'],[0.667,'⅔'],[0.5,'½'],[0.333,'⅓'],[0.25,'¼'],[0.125,'⅛']];
    let fs=''; for(const [f,s] of fracs){ if(Math.abs(rem-f)<0.08){fs=s;break;} }
    if(fs) return (whole>0?whole+' ':'')+fs+' cup'+(whole+(fs?0.5:0)>1?'s':'');
    const r=Math.round(cups*10)/10; return r+' cup'+(r!==1?'s':'');
  }
  if(ml>=tbsp){ const r=Math.round((ml/tbsp)*2)/2; return r+(r===1?' tbsp':' tbsp'); }
  if(ml>=tsp){ const r=Math.round((ml/tsp)*2)/2; return r+(r===1?' tsp':' tsp'); }
  return ml<2?'pinch':'';
}

// ═══════════════════════════════════════
// CONSOLIDATION
// ═══════════════════════════════════════
const VOL={ml:1,l:1000,L:1000,cup:250,cups:250,tsp:5,tbsp:15,'fl oz':30,'fl.oz':30,floz:30,pint:473,pt:473,qt:946,quart:946};
const WGT={g:1,kg:1000,oz:28.35,lb:453.6,lbs:453.6};
function pn(s){ if(!s) return null; s=String(s).trim(); if(s.includes('/')){ const p=s.split('/'); return parseFloat(p[0])/parseFloat(p[1]); } const n=parseFloat(s); return isNaN(n)?null:n; }
function toBase(qty,unit){ const n=pn(qty); if(n===null) return null; const u=(unit||'').trim(); const l=u.toLowerCase(); if(VOL[l]!==undefined) return{v:n*VOL[l],t:'vol'}; if(VOL[u]!==undefined) return{v:n*VOL[u],t:'vol'}; if(WGT[l]!==undefined) return{v:n*WGT[l],t:'wgt'}; if(WGT[u]!==undefined) return{v:n*WGT[u],t:'wgt'}; return{v:n,t:'cnt',u}; }
// Returns {primary, secondary}. Secondary shows alternate scale when useful.
function fmtVal(base,t,ou){
  if(t==='vol'){
    const ml=Math.round(base), L=Math.round(base/100)/10;
    if(base>=1000) return{primary:L+'L', secondary:(L%1!==0)?ml+'ml':null};
    return{primary:ml+'ml', secondary:base>=500?(Math.round(base/100)/10)+'L':null};
  }
  if(t==='wgt'){
    const g=Math.round(base), kg=Math.round(base/100)/10;
    if(base>=1000) return{primary:kg+'kg', secondary:(kg%1!==0)?g+'g':null};
    return{primary:g+'g', secondary:base>=500?(Math.round(base/100)/10)+'kg':null};
  }
  const r=Math.round(base*10)/10;
  return{primary:ou?r+' '+ou:String(r), secondary:null};
}
function fmtDisplay(base,t,ou){ const f=fmtVal(base,t,ou); return f.secondary?f.primary+' ('+f.secondary+')':f.primary; }

function consolidate(recs){
  const map=new Map();
  recs.forEach(rec=>{
    (rec.ingredients||[]).forEach(ing=>{
      const key=ing.name.trim().toLowerCase();
      const hasUnit = ing.unit && ing.unit.trim() !== '';
      const b = hasUnit ? toBase(ing.qty, ing.unit) : null;
      const isCount = !hasUnit; // no unit = countable (1 tomato, 3 eggs)
      const countVal = isCount ? (parseFloat(ing.qty)||0) : 0;

      if(!map.has(key)){
        const fmt = b ? fmtVal(b.v, b.t, ing.unit) : null;
        map.set(key, {
          name: key,
          _b: b?.v ?? null,
          _t: b?.t ?? null,
          _u: ing.unit,
          _count: isCount ? countVal : null, // for countable items
          isCount,
          dq: fmt ? fmt.primary : (ing.qty || '—'),
          dq2: fmt?.secondary || null,
          _ml: (b && b.t==='vol') ? b.v : null,
          sources: [rec.name]
        });
      } else {
        const e = map.get(key);
        if(!e.sources.includes(rec.name)) e.sources.push(rec.name);
        if(isCount && e.isCount){
          // Add counts together: 2 tomatoes + 3 tomatoes = 5 tomatoes
          e._count += countVal;
          e.dq = String(e._count);
        } else if(b && e._b !== null && b.t === e._t){
          e._b += b.v;
          const fmt = fmtVal(e._b, e._t, e._u);
          e.dq = fmt.primary; e.dq2 = fmt.secondary || null;
          if(b.t==='vol') e._ml = e._b;
        } else if(b && e._b !== null){
          e.dq = e.dq + ' + ' + (ing.qty + (ing.unit ? ' '+ing.unit : ''));
          e.dq2 = null; e._ml = null;
        }
      }
    });
  });
  return [...map.values()].sort((a,b_)=>a.name.localeCompare(b_.name));
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadAll();
</script>
